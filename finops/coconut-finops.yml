description: >-
  FinOps view of Coconut spend. Coconut bills usage-based, per-output-minute
  rates that vary by output resolution tier (Audio $0.00325, SD $0.00750, HD
  $0.01500, UHD $0.03000 per output minute). Output minutes equal the duration
  of each output file summed across all formats produced from a source, so
  transcoding one source into multiple renditions multiplies billable minutes.
  Failed jobs, thumbnail generation, and API calls are not billed. Billing is
  monthly for the prior month's volume with no minimums or commitments.
notes: >-
  Per-tier rates are subject to change; verify against the Coconut pricing
  page during reconciliation. Cost is driven primarily by output count and
  resolution, not source length alone.
