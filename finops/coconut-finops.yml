principles:
- name: Visibility
  description: Track output minutes by resolution tier; account for the multiplier of producing several renditions per source.
- name: Allocation
  description: Tag jobs or API keys per workload/team and map output minutes to internal cost centers.
- name: Optimization
  description: Produce only the renditions you need; prefer lower tiers where acceptable; rely on free thumbnail generation and unbilled failed jobs.
- name: Accountability
  description: Review monthly output-minute spend against budget and assign owners per project/key.
